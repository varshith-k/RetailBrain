global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: retailbrain-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: retailbrain-processor
    metrics_path: /metrics
    static_configs:
      - targets: ["processor:9108"]
